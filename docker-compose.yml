services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n_hometrakker
    restart: unless-stopped
    user: root
    ports:
      - "5678:5678"
    environment:
      - NODES_EXCLUDE=[]
      - N8N_UNSAFE_WORKFLOW_EXECUTE_COMMANDS=true
      - TZ=America/New_York
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - ~/.n8n:/root/.n8n
      - /Users/benbirkhahn/HomerTrakker:/root/HomerTrakker
